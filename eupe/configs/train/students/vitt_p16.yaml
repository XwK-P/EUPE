# EUPE ViT-T/16 student (6M). Matches eupe/hub/backbones.py::eupe_vitt16.
student:
  arch: vit_small            # selects the ViT family; build_model threads the explicit dims below (192/12/3 = ViT-T, NOT vit_small's 384/12/6)
  embed_dim: 192
  depth: 12
  num_heads: 3
  patch_size: 16
  n_storage_tokens: 4
  layerscale: 1.0e-05
  norm_layer: layernormbf16
  ffn_layer: mlp
  ffn_ratio: 4.0
  mask_k_bias: true
  drop_path_rate: 0.0
  pos_embed_type: rope
  pos_embed_rope_base: 100
  pos_embed_rope_normalize_coords: separate
  pos_embed_rope_rescale_coords: 2
  pos_embed_rope_dtype: fp32

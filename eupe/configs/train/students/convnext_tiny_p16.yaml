# EUPE ConvNeXt-Tiny student (29M). Matches eupe/models/convnext.py::convnext_sizes["tiny"].
# depths/dims are INFORMATIONAL — build_model derives them from `arch` via convnext_sizes.
student:
  arch: convnext_tiny
  depths: [3, 3, 9, 3]
  dims: [96, 192, 384, 768]
  drop_path_rate: 0.0
  layer_scale_init_value: 1.0e-06

# Stage 1: {PEcore-G, PElang-G, DINOv3-H+} -> ViT-G proxy. Single student (the proxy).
MODEL:
  META_ARCHITECTURE: DistillationMetaArch
compute_precision:
  param_dtype: bf16
  reduce_dtype: fp32
  sharding_strategy: SHARD_GRAD_OP   # use FULL_SHARD if memory-bound on the 1.9B proxy
distill:
  teachers:
    - {name: pecore_g,     config: teachers/pecore_g.yaml}
    - {name: pelang_g,     config: teachers/pelang_g.yaml}
    - {name: dinov3_hplus, config: teachers/dinov3_hplus.yaml}
  adapter_hidden_dim: 1536
  normalizer_warmup_iters: 500
  loss: {alpha: 0.9, beta: 0.1, dinov3_patch_gamma: 1.0}
  imagenet_prob: 0.10                  # P(homogeneous ImageNet-1k batch) vs LVD (paper §3.4)
student:                              # ~1.9B ViT-G proxy (kept in sync with proxy/vitg_p16.yaml)
  arch: vit_giant2
  embed_dim: 1536
  depth: 40
  num_heads: 24
  ffn_ratio: 8.0                      # ~1.89B (stock giant2 ffn_ratio=4 is ~1.1B); paper §4.1 only says "1.9B"
  patch_size: 16
  n_storage_tokens: 4
  layerscale: 1.0e-05
  norm_layer: layernormbf16
  ffn_layer: mlp
  mask_k_bias: true
  pos_embed_type: rope
  pos_embed_rope_base: 100
  pos_embed_rope_normalize_coords: separate
  pos_embed_rope_rescale_coords: 2
  pos_embed_rope_dtype: fp32
crops:
  global_crops_size: 256
# NOTE: the paper does NOT specify Stage-1 batch size / LR / iteration count (§4.1 gives only the
# Stage 2/3 recipe). The values below are defensible DINOv3 distilled-config / AM-RADIO defaults —
# TUNE them and gate on the Table-4 proxy scores before spending Stage-2 compute. schedules-v2 sets
# the peak LR directly so it is NOT silently rescaled by world size (apply_scaling_rules_to_cfg).
optim:
  optimizer: adamw
  epochs: 250                         # 1250 * 250 = 312500 iters (PLACEHOLDER — paper does not state this; tune)
  clip_grad: 3.0
  weight_decay: 0.04
  layerwise_decay: 0.99               # report §7.1 (DINOv3 distilled-config default)
  patch_embed_lr_mult: 0.2
  adamw_beta1: 0.9
  adamw_beta2: 0.999
schedules:                            # peak set directly -> bypasses sqrt_wrt_1024 LR scaling (§7.5)
  lr: {start: 0.0, peak: 2.0e-04, end: 1.0e-06, warmup_epochs: 10, cosine: true}   # defensible default; tune
  weight_decay: {peak: 0.04, end: 0.2}   # 0.04 -> 0.2 over training (report §7.1)
train:
  dataset_path: <LVD1689M:root=/PATH>+<ImageNet:split=TRAIN:root=/PATH:extra=/PATH>   # '+'-split: LVD + IN1k (mixed at distill.imagenet_prob); see eupe/data/distillation_loaders.py
  compile: true
  checkpointing: true

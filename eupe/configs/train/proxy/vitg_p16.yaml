# ViT-G proxy (~1.9B). Stage-1 student; Stage-2/3 teacher.
# Paper §4.1 only states "1.9B ViT-G with 4 register tokens" and gives no exact dims. Stock
# vit_giant2 (1536/40/24, ffn 4) is ~1.1B, so we widen the FFN to ffn_ratio=8 to land at ~1.89B
# (per-block ≈ (4+2*8)*1536^2 = 47.2M x 40 + embeddings). build_model now threads these explicit
# dims (it would otherwise ignore them and build the 1.1B factory default). Tune to taste and gate
# on the Table-4 proxy scores; depth could be raised instead of ffn_ratio for the same budget.
student:
  arch: vit_giant2          # ViT family; explicit dims below are authoritative (threaded by build_model)
  embed_dim: 1536
  depth: 40
  num_heads: 24
  ffn_ratio: 8.0            # ~1.89B at 1536/40/24 (stock giant2 ffn_ratio=4 is ~1.1B — too small for the 1.9B proxy)
  patch_size: 16
  n_storage_tokens: 4       # 4 register tokens (paper §4.1)
  layerscale: 1.0e-05
  norm_layer: layernormbf16
  ffn_layer: mlp
  mask_k_bias: true
  pos_embed_type: rope
  pos_embed_rope_base: 100
  pos_embed_rope_normalize_coords: separate
  pos_embed_rope_rescale_coords: 2
  pos_embed_rope_dtype: fp32
